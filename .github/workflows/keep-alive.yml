name: Keep Backend Alive

on:
  schedule:
    # Runs every 10 minutes (approximate) to keep Render container warm
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Check
        run: |
          curl -s -I -X GET "https://telegram-message-search.onrender.com/api/v1/health" || echo "Ping failed or server is waking up"

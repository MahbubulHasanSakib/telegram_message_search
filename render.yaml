services:
  - type: web
    name: telegram-search-backend
    env: node
    region: oregon
    buildCommand: npm --prefix apps/backend install && npm --prefix apps/backend run prisma:generate && npm --prefix apps/backend run build
    startCommand: npm --prefix apps/backend run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
